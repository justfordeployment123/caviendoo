name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'caviendoo-api/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install
        working-directory: caviendoo-api
        run: npm install

      - name: Typecheck
        working-directory: caviendoo-api
        run: npx tsc --noEmit

      - name: Build
        working-directory: caviendoo-api
        run: npm run build

      - name: Success
        run: echo "API Build and Typecheck successful"
